services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: .
      target: frontend-dev
    environment:
      - VITE_KATAGO_BACKEND_URL=/api
      - VITE_KATAGO_PROXY_TARGET=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
